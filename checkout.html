<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إتمام الطلب | صيدلية د. مرزوق الصاوي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E2A2E; --petrol:#0F4C4F; --petrol-deep:#0A3638;
    --cream:#F6F2EA; --paper:#FFFEFB; --amber:#D98C4A; --line:rgba(14,42,46,0.12);
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'IBM Plex Sans Arabic', sans-serif; background:var(--cream); color:var(--ink);}
  h1,h2{font-family:'Tajawal';}

  .topbar{
    display:flex; align-items:center; justify-content:space-between; padding:14px 18px;
    background:var(--petrol-deep); color:#fff;
  }
  .topbar a{color:#fff; text-decoration:none; font-size:13.5px; background:rgba(255,255,255,0.12); padding:8px 14px; border-radius:999px;}
  .topbar .brand{font-family:'Tajawal'; font-size:14px; font-weight:700;}

  .wrap{max-width:560px; margin:0 auto; padding:20px;}
  .page-title{font-size:19px; margin:0 0 16px;}

  .section{background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:16px;}
  .section h2{font-size:15px; margin:0 0 14px; color:var(--petrol-deep);}

  .order-item{display:flex; align-items:center; gap:12px; padding:9px 0; border-bottom:1px solid var(--line);}
  .order-item:last-child{border-bottom:none;}
  .order-item img{width:42px; height:42px; border-radius:8px; object-fit:cover; flex-shrink:0; background:var(--cream);}
  .order-item .info{flex:1; min-width:0;}
  .order-item .info .name{font-size:13.5px; margin:0 0 2px;}
  .order-item .info .qty{font-size:12px; color:rgba(14,42,46,0.6);}
  .order-item .line-total{font-size:13.5px; font-weight:700; color:var(--petrol);}

  .total-row{display:flex; justify-content:space-between; align-items:center; padding-top:12px; margin-top:8px; border-top:2px solid var(--petrol);}
  .total-row .label{font-family:'Tajawal'; font-weight:700; font-size:15px;}
  .total-row .value{font-family:'Tajawal'; font-weight:800; font-size:19px; color:var(--petrol);}

  label{font-size:13.5px; font-weight:600; display:block; margin:0 0 6px;}
  input, textarea{
    width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--line);
    font-family:'IBM Plex Sans Arabic'; font-size:14.5px; margin-bottom:14px; background:var(--cream);
  }
  textarea{resize:vertical; min-height:60px;}
  .field-error{color:#C0392B; font-size:12px; margin-top:-10px; margin-bottom:12px; display:none;}

  .radio-group{display:flex; gap:10px; margin-bottom:14px;}
  .radio-option{
    flex:1; border:1px solid var(--line); border-radius:10px; padding:12px; text-align:center;
    cursor:pointer; font-size:13.5px; background:var(--cream);
  }
  .radio-option.active{border-color:var(--petrol); background:#E6F0EF; color:var(--petrol-deep); font-weight:700;}

  .locate-btn{
    background:none; border:1px dashed var(--petrol); color:var(--petrol); border-radius:10px;
    padding:9px 12px; font-size:12.5px; cursor:pointer; margin:-8px 0 14px; width:100%;
    font-family:'IBM Plex Sans Arabic';
  }
  .locate-btn:disabled{opacity:.6;}

  .btn-confirm{
    width:100%; padding:15px; border-radius:12px; border:none; background:var(--petrol);
    color:#fff; font-family:'Tajawal'; font-weight:800; font-size:16px; cursor:pointer;
  }
  .btn-confirm:disabled{opacity:.6;}
  #status-msg{font-size:13px; text-align:center; margin-top:12px; color:var(--petrol);}
  #status-msg.error{color:#C0392B;}

  .empty-state{text-align:center; padding:60px 20px; color:rgba(14,42,46,0.55);}
  .empty-state a{color:var(--petrol); font-weight:700; text-decoration:none;}
</style>
</head>
<body>

<div class="topbar">
  <a href="cart.html">→ رجوع للسلة</a>
  <span class="brand">صيدلية د. مرزوق الصاوي</span>
</div>

<div class="wrap">
  <h1 class="page-title">إتمام الطلب</h1>
  <div id="page-content"><!-- يتم حقنها ديناميكيًا --></div>
</div>

<script type="module">
  import Cart from "./cart.js";
  import { db, doc, getDoc, runTransaction } from "./firebase-config.js";
  import { LS_KEYS, COLLECTIONS, ORDER_STATUS, WHATSAPP_NUMBERS } from "./constants.js";
  import {
    formatPrice,
    generateOrderId,
    buildWhatsAppLink,
    getLocalItem,
    setLocalItem,
    showToast,
    getCurrentLocation,
  } from "./utils.js";

  const contentEl = document.getElementById("page-content");

  function renderEmpty() {
    contentEl.innerHTML = `
      <div class="empty-state">
        <p>السلة فارغة، مفيش طلب لإتمامه.</p>
        <a href="index.html">تصفح المنتجات</a>
      </div>`;
  }

  function renderCheckout(cart) {
    const total = Cart.getTotalPrice();
    const saved = getLocalItem(LS_KEYS.GUEST_CUSTOMER_INFO, {});

    contentEl.innerHTML = `
      <div class="section">
        <h2>ملخص الطلب</h2>
        ${cart.map(item => `
          <div class="order-item">
            <img src="${item.image || "icon-192.png"}" alt="${item.trade_name}">
            <div class="info">
              <p class="name">${item.trade_name}</p>
              <p class="qty">الكمية: ${item.qty}</p>
            </div>
            <div class="line-total">${formatPrice(item.price * item.qty)}</div>
          </div>
        `).join("")}
        <div class="total-row">
          <span class="label">الإجمالي</span>
          <span class="value">${formatPrice(total)}</span>
        </div>
      </div>

      <div class="section">
        <h2>بيانات التواصل والتسليم</h2>
        <form id="checkout-form">
          <label for="c-name">الاسم بالكامل</label>
          <input type="text" id="c-name" required value="${saved.name || ""}">

          <label for="c-phone">رقم الموبايل</label>
          <input type="tel" id="c-phone" required placeholder="01xxxxxxxxx" value="${saved.phone || ""}">
          <div class="field-error" id="phone-error">رقم الموبايل غير صحيح</div>

          <label>طريقة الاستلام</label>
          <div class="radio-group" id="delivery-mode">
            <div class="radio-option" data-value="pickup">استلام من الصيدلية</div>
            <div class="radio-option" data-value="delivery">توصيل للمنزل</div>
          </div>

          <div id="address-field" style="display:none;">
            <label for="c-address">العنوان بالتفصيل</label>
            <textarea id="c-address" placeholder="الحي، الشارع، أقرب علامة مميزة...">${saved.address || ""}</textarea>
            <button type="button" class="locate-btn" id="locate-btn">📍 استخدم موقعي الحالي (يضيف رابط خريطة للعنوان)</button>
          </div>

          <label for="c-notes">ملاحظات إضافية (اختياري)</label>
          <textarea id="c-notes" placeholder="مثال: عايز بديل لو صنف مش متوفر"></textarea>

          <button type="submit" class="btn-confirm" id="confirm-btn">تأكيد الطلب وإرساله عبر واتساب</button>
          <div id="status-msg"></div>
        </form>
      </div>
    `;

    // ===== وضع الاستلام =====
    const modeOptions = contentEl.querySelectorAll("#delivery-mode .radio-option");
    const addressField = document.getElementById("address-field");
    let deliveryMode = saved.delivery_mode || "pickup";

    function applyModeUI() {
      modeOptions.forEach(o => o.classList.toggle("active", o.dataset.value === deliveryMode));
      addressField.style.display = deliveryMode === "delivery" ? "block" : "none";
    }
    applyModeUI();

    modeOptions.forEach(opt => {
      opt.addEventListener("click", () => {
        deliveryMode = opt.dataset.value;
        applyModeUI();
      });
    });

    // ===== زرار تحديد الموقع الحالي =====
    document.getElementById("locate-btn").addEventListener("click", async (e) => {
      const btn = e.currentTarget;
      btn.disabled = true;
      btn.textContent = "جاري تحديد الموقع...";
      try {
        const { lat, lng } = await getCurrentLocation();
        const mapLink = `https://maps.google.com/?q=${lat},${lng}`;
        const addressEl = document.getElementById("c-address");
        addressEl.value = addressEl.value
          ? `${addressEl.value}\nموقع GPS: ${mapLink}`
          : `موقع GPS: ${mapLink}`;
        btn.textContent = "✔ تم إضافة الموقع";
      } catch (err) {
        btn.textContent = "تعذر تحديد الموقع، اكتب العنوان يدويًا";
      }
      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = "📍 استخدم موقعي الحالي (يضيف رابط خريطة للعنوان)";
      }, 2500);
    });

    // ===== إرسال الطلب =====
    document.getElementById("checkout-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const confirmBtn = document.getElementById("confirm-btn");
      const statusMsg = document.getElementById("status-msg");
      const phoneError = document.getElementById("phone-error");

      const name = document.getElementById("c-name").value.trim();
      const phone = document.getElementById("c-phone").value.trim();
      const address = document.getElementById("c-address").value.trim();
      const notes = document.getElementById("c-notes").value.trim();

      const phonePattern = /^01[0125][0-9]{8}$/;
      if (!phonePattern.test(phone)) {
        phoneError.style.display = "block";
        return;
      }
      phoneError.style.display = "none";

      if (deliveryMode === "delivery" && !address) {
        statusMsg.classList.add("error");
        statusMsg.textContent = "من فضلك اكتب العنوان لو هتختار التوصيل.";
        return;
      }

      confirmBtn.disabled = true;
      statusMsg.classList.remove("error");
      statusMsg.textContent = "جاري تسجيل الطلب...";

      const orderId = generateOrderId();
      const orderData = {
        order_id: orderId,
        customer_name: name,
        customer_phone: phone,
        delivery_mode: deliveryMode,
        address: deliveryMode === "delivery" ? address : "",
        notes,
        items: cart.map(item => ({
          id: item.id,
          trade_name: item.trade_name,
          price: item.price,
          qty: item.qty,
        })),
        total,
        status: ORDER_STATUS.PENDING,
        created_at: new Date().toISOString(),
      };

      try {
        // ===== V3.3: فحص وخصم المخزون + تسجيل الطلب في Transaction واحدة ذرية =====
        // ده بيمنع بيع نفس القطعة الأخيرة لعميلين في نفس اللحظة.
        // ملحوظة: منتجات لسه معندهاش حقل "stock" (لسه ما اتحفظتش من لوحة التحكم) بيتم تجاوز فحصها
        // عشان منكسرش الطلبات الحالية، لحد ما تحدّث كل منتج بكميته الفعلية.
        await runTransaction(db, async (transaction) => {
          const productRefs = cart.map(item => doc(db, COLLECTIONS.PRODUCTS, item.id));
          const productSnaps = await Promise.all(productRefs.map(ref => transaction.get(ref)));

          // 1) فحص التوفر لكل صنف قبل أي تعديل
          productSnaps.forEach((snap, i) => {
            const item = cart[i];
            if (!snap.exists()) {
              throw new Error(`المنتج "${item.trade_name}" لم يعد متاحًا، من فضلك احذفه من السلة.`);
            }
            const data = snap.data();
            if (data.stock !== undefined && data.stock < item.qty) {
              throw new Error(`الكمية المتاحة من "${item.trade_name}" أقل من المطلوب (متاح: ${data.stock}).`);
            }
          });

          // 2) خصم الكمية من كل منتج
          productSnaps.forEach((snap, i) => {
            const item = cart[i];
            const data = snap.data();
            if (data.stock !== undefined) {
              transaction.update(productRefs[i], { stock: data.stock - item.qty });
            }
          });

          // 3) تسجيل الطلب نفسه
          const orderRef = doc(db, COLLECTIONS.ORDERS, orderId);
          transaction.set(orderRef, orderData);
        });

        // حفظ بيانات العميل محليًا للمرة الجاية
        setLocalItem(LS_KEYS.GUEST_CUSTOMER_INFO, { name, phone, delivery_mode: deliveryMode, address });

        const lines = [
          `طلب جديد #${orderId}`,
          `الاسم: ${name}`,
          `الموبايل: ${phone}`,
          deliveryMode === "delivery" ? `التوصيل: للمنزل — ${address}` : `الاستلام: من الصيدلية`,
          "—",
          ...cart.map(item => `${item.trade_name} × ${item.qty} = ${formatPrice(item.price * item.qty)}`),
          "—",
          `الإجمالي: ${formatPrice(total)}`,
          notes ? `ملاحظات: ${notes}` : "",
        ].filter(Boolean).join("\n");

        const waUrl = buildWhatsAppLink(WHATSAPP_NUMBERS.ORDERS, lines);

        Cart.clearCart();
        statusMsg.classList.remove("error");
        statusMsg.textContent = "✔ تم تسجيل الطلب، جاري تحويلك لواتساب...";
        showToast("تم إرسال الطلب بنجاح");

        setTimeout(() => { window.location.href = waUrl; }, 800);
      } catch (err) {
        statusMsg.classList.add("error");
        statusMsg.textContent = "❌ " + err.message;
        confirmBtn.disabled = false;
      }
    });
  }

  // ===== نقطة البداية =====
  const cart = Cart.getCart();
  if (!cart.length) {
    renderEmpty();
  } else {
    renderCheckout(cart);
  }
</script>
</body>
</html>
