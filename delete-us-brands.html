<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حذف أسماء تجارية أمريكية غير متداولة في مصر</title>
<style>
  body{font-family:sans-serif;background:#F6F2EA;color:#0E2A2E;padding:24px;line-height:1.8;}
  button{background:#C0392B;color:#fff;border:none;padding:14px 24px;border-radius:10px;font-size:16px;cursor:pointer;margin-top:16px;}
  button:disabled{opacity:.5;}
  #log{margin-top:20px;background:#fff;border-radius:10px;padding:16px;white-space:pre-wrap;font-size:14px;max-height:400px;overflow-y:auto;border:1px solid #ddd;}
  .ok{color:#2E7D55;}
  .err{color:#C0392B;}
</style>
</head>
<body>
<h2>🗑️ حذف أسماء تجارية أمريكية غير متداولة في مصر</h2>
<p>27 صنف بأسماء تجارية أمريكية (زي TYLENOL, ADVIL, ZANTAC) مش متداولة في السوق المصري بنفس الاسم.</p>
<button id="delete-btn">ابدأ الحذف الآن</button>
<div id="log"></div>

<script type="module">
  import { requireAuth, deleteProduct } from "./firebase-config.js";

  const btn = document.getElementById("delete-btn");
  const log = document.getElementById("log");

  function addLog(msg, ok = true) {
    const line = document.createElement("div");
    line.className = ok ? "ok" : "err";
    line.textContent = msg;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }

  await requireAuth();
  addLog("تم تسجيل الدخول بنجاح. جاهز للحذف.");

  const idsToDelete = ["p193", "p194", "p195", "p417", "p418", "p1337", "p1879", "p1880", "p1881", "p2282", "p2439", "p2440", "p2441", "p3191", "p3192", "p3193", "p3683", "p3684", "p3685", "p3686", "p3687", "p3688", "p4059", "p4060", "p4061", "p4062", "p4248"];

  btn.addEventListener("click", async () => {
    btn.disabled = true;
    btn.textContent = "جاري الحذف...";
    try {
      addLog(`جاري حذف ${idsToDelete.length} صنف...`);
      for (const id of idsToDelete) {
        await deleteProduct(id);
        addLog(`✔ تم حذف: ${id}`);
      }
      addLog("🎉 اكتمل الحذف بنجاح!");
      btn.textContent = "تم الحذف بنجاح ✅";
    } catch (err) {
      addLog("❌ حدث خطأ: " + err.message, false);
      btn.disabled = false;
      btn.textContent = "حاول تاني";
    }
  });
</script>
</body>
</html>
