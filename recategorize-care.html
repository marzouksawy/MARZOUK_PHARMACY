<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعادة تصنيف منتجات العناية القديمة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#0F4C4F;
    --cream:#F6F2EA;
    --paper:#FFFEFB;
    --amber:#D98C4A;
    --danger:#B3413A;
    --border:#E4DDCE;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'IBM Plex Sans Arabic','Tajawal',sans-serif;
    background:var(--cream);
    color:var(--teal);
    padding-bottom:110px;
  }
  header{
    background:var(--teal);
    color:var(--paper);
    padding:18px 16px;
    position:sticky;
    top:0;
    z-index:20;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
  }
  header h1{
    font-family:'Tajawal',sans-serif;
    font-size:19px;
    margin:0 0 4px;
  }
  header p{
    margin:0;
    font-size:13px;
    opacity:.85;
  }
  #authGate{
    padding:60px 20px;
    text-align:center;
    font-size:15px;
  }
  .wrap{
    max-width:720px;
    margin:0 auto;
    padding:14px;
    display:none;
  }
  .toolbar{
    background:var(--paper);
    border:1px solid var(--border);
    border-radius:14px;
    padding:12px;
    margin-bottom:14px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
    position:sticky;
    top:78px;
    z-index:15;
  }
  .toolbar button{
    border:none;
    border-radius:10px;
    padding:9px 14px;
    font-family:inherit;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
  }
  #selectAllBtn{background:var(--teal);color:var(--paper);}
  #clearSelBtn{background:#EDE7D9;color:var(--teal);}
  .count-pill{
    margin-inline-start:auto;
    background:var(--amber);
    color:var(--paper);
    font-size:12px;
    font-weight:700;
    padding:6px 12px;
    border-radius:999px;
  }
  .list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .card{
    background:var(--paper);
    border:1px solid var(--border);
    border-radius:14px;
    padding:12px;
    display:flex;
    gap:10px;
    align-items:flex-start;
    transition:border-color .15s, background .15s;
  }
  .card.selected{
    border-color:var(--amber);
    background:#FFF8ED;
  }
  .card img{
    width:56px;
    height:56px;
    object-fit:cover;
    border-radius:10px;
    background:#EEE;
    flex-shrink:0;
  }
  .card .info{
    flex:1;
    min-width:0;
  }
  .card .info .name{
    font-weight:700;
    font-size:14.5px;
    margin:0 0 3px;
  }
  .card .info .meta{
    font-size:12px;
    color:#6B6152;
    margin:0 0 8px;
  }
  .card input[type=checkbox]{
    width:20px;
    height:20px;
    margin-top:2px;
    accent-color:var(--amber);
    flex-shrink:0;
  }
  .quick-btns{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }
  .quick-btns button{
    border:1px solid var(--border);
    background:var(--cream);
    color:var(--teal);
    font-family:inherit;
    font-size:11.5px;
    font-weight:600;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
  }
  .quick-btns button:active{
    background:var(--teal);
    color:var(--paper);
  }
  .empty{
    text-align:center;
    padding:60px 20px;
    color:#8A806E;
    font-size:14px;
  }
  .loading{
    text-align:center;
    padding:40px;
    font-size:14px;
    color:#8A806E;
  }
  /* شريط سفلي لتعيين جماعي */
  #bulkBar{
    position:fixed;
    bottom:0;
    right:0;
    left:0;
    background:var(--teal);
    padding:12px 14px;
    display:none;
    z-index:30;
    box-shadow:0 -4px 14px rgba(0,0,0,.2);
  }
  #bulkBar.show{display:block;}
  #bulkBar .label{
    color:var(--paper);
    font-size:12.5px;
    font-weight:700;
    margin-bottom:8px;
    text-align:center;
  }
  #bulkBar .options{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:6px;
    max-width:720px;
    margin:0 auto;
  }
  #bulkBar .options button{
    border:none;
    border-radius:10px;
    padding:10px 4px;
    font-family:inherit;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    background:var(--paper);
    color:var(--teal);
  }
  #bulkBar .options button:active{
    background:var(--amber);
    color:var(--paper);
  }
  #toast{
    position:fixed;
    top:14px;
    left:50%;
    transform:translateX(-50%) translateY(-60px);
    background:var(--teal);
    color:var(--paper);
    padding:10px 18px;
    border-radius:10px;
    font-size:13px;
    font-weight:600;
    z-index:50;
    transition:transform .25s ease;
    box-shadow:0 4px 12px rgba(0,0,0,.2);
  }
  #toast.show{transform:translateX(-50%) translateY(0);}
  #toast.err{background:var(--danger);}
</style>
</head>
<body>

<header>
  <h1>إعادة تصنيف منتجات "العناية" القديمة</h1>
  <p>توزيع منتجات قسم care السابق على: العناية بالبشرة، الطفل والأم، المستلزمات الطبية، العناية الشخصية</p>
</header>

<div id="authGate">جارِ التحقق من صلاحية الدخول...</div>

<div class="wrap" id="mainWrap">
  <div class="toolbar">
    <button id="selectAllBtn" type="button">تحديد الكل</button>
    <button id="clearSelBtn" type="button">إلغاء التحديد</button>
    <span class="count-pill" id="countPill">0 محدد</span>
  </div>

  <div id="listContainer" class="loading">جارِ تحميل المنتجات...</div>
</div>

<div id="bulkBar">
  <div class="label">تعيين <span id="bulkCount">0</span> منتج محدد إلى:</div>
  <div class="options">
    <button data-cat="skincare" type="button">العناية بالبشرة</button>
    <button data-cat="baby" type="button">الطفل والأم</button>
    <button data-cat="medical_supplies" type="button">مستلزمات طبية</button>
    <button data-cat="personal_care" type="button">العناية الشخصية</button>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { db, requireAuth } from './firebase-config.js';
import {
  collection, query, where, getDocs, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const ADMIN_UID = "Mu5pttWxcCgPVA6KMg2V1az2lip2";

const CATEGORY_LABELS = {
  skincare: "العناية بالبشرة",
  baby: "الطفل والأم",
  medical_supplies: "مستلزمات طبية",
  personal_care: "العناية الشخصية"
};

let products = [];
const selected = new Set();

const authGate = document.getElementById('authGate');
const mainWrap = document.getElementById('mainWrap');
const listContainer = document.getElementById('listContainer');
const countPill = document.getElementById('countPill');
const bulkBar = document.getElementById('bulkBar');
const bulkCount = document.getElementById('bulkCount');
const toast = document.getElementById('toast');

function showToast(msg, isErr=false){
  toast.textContent = msg;
  toast.className = isErr ? 'show err' : 'show';
  setTimeout(()=> toast.classList.remove('show'), 2600);
}

requireAuth('admin-login.html').then((user) => {
  if (user.uid === ADMIN_UID) {
    authGate.style.display = 'none';
    mainWrap.style.display = 'block';
    loadCareProducts();
  } else {
    authGate.innerHTML = 'هذه الصفحة مخصصة للأدمن فقط.<br><a href="./admin-login.html" style="color:#D98C4A;font-weight:700;">تسجيل خروج والدخول بحساب الأدمن</a>';
  }
});

async function loadCareProducts(){
  try{
    const q = query(collection(db, 'products'), where('category', '==', 'care'));
    const snap = await getDocs(q);
    products = [];
    snap.forEach(d => products.push({ id: d.id, ...d.data() }));

    if (products.length === 0){
      listContainer.innerHTML = '<div class="empty">لا توجد منتجات متبقية بقسم "care" 🎉<br>يمكنك الآن رفع firebase-config.js بالأقسام الجديدة بأمان.</div>';
      return;
    }

    renderList();
  } catch(err){
    console.error(err);
    listContainer.innerHTML = `<div class="empty">حدث خطأ أثناء التحميل: ${err.message}</div>`;
  }
}

function renderList(){
  listContainer.innerHTML = '';
  listContainer.className = 'list';

  products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = p.id;

    const img = p.image || p.imageUrl || '';
    const name = p.tradeName || p.name || 'بدون اسم';
    const active = p.activeIngredient || p.company || '';

    card.innerHTML = `
      <input type="checkbox" data-id="${p.id}">
      <img src="${img}" onerror="this.style.visibility='hidden'" alt="">
      <div class="info">
        <p class="name">${name}</p>
        <p class="meta">${active}</p>
        <div class="quick-btns">
          <button data-id="${p.id}" data-cat="skincare">بشرة</button>
          <button data-id="${p.id}" data-cat="baby">طفل وأم</button>
          <button data-id="${p.id}" data-cat="medical_supplies">مستلزمات</button>
          <button data-id="${p.id}" data-cat="personal_care">شخصية</button>
        </div>
      </div>
    `;
    listContainer.appendChild(card);
  });

  // تحديد فردي
  listContainer.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      const id = cb.dataset.id;
      if (cb.checked) selected.add(id); else selected.delete(id);
      cb.closest('.card').classList.toggle('selected', cb.checked);
      updateSelectionUI();
    });
  });

  // تعيين فردي سريع (زر واحد يعيّن منتج واحد فوراً)
  listContainer.querySelectorAll('.quick-btns button').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const cat = btn.dataset.cat;
      assignCategory([id], cat);
    });
  });
}

function updateSelectionUI(){
  countPill.textContent = `${selected.size} محدد`;
  bulkCount.textContent = selected.size;
  bulkBar.classList.toggle('show', selected.size > 0);
}

document.getElementById('selectAllBtn').addEventListener('click', () => {
  listContainer.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.checked = true;
    selected.add(cb.dataset.id);
    cb.closest('.card').classList.add('selected');
  });
  updateSelectionUI();
});

document.getElementById('clearSelBtn').addEventListener('click', () => {
  listContainer.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.checked = false;
    cb.closest('.card').classList.remove('selected');
  });
  selected.clear();
  updateSelectionUI();
});

bulkBar.querySelectorAll('button[data-cat]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (selected.size === 0) return;
    assignCategory(Array.from(selected), btn.dataset.cat);
  });
});

async function assignCategory(ids, newCategory){
  const label = CATEGORY_LABELS[newCategory] || newCategory;
  try{
    for (const id of ids){
      await updateDoc(doc(db, 'products', id), { category: newCategory });
      // إزالة من القائمة والاختيار
      const card = listContainer.querySelector(`.card[data-id="${id}"]`);
      if (card) card.remove();
      selected.delete(id);
      products = products.filter(p => p.id !== id);
    }
    showToast(`تم نقل ${ids.length} منتج إلى: ${label}`);
    updateSelectionUI();

    if (products.length === 0){
      listContainer.innerHTML = '<div class="empty">لا توجد منتجات متبقية بقسم "care" 🎉<br>يمكنك الآن رفع firebase-config.js بالأقسام الجديدة بأمان.</div>';
    }
  } catch(err){
    console.error(err);
    showToast('حدث خطأ أثناء التحديث: ' + err.message, true);
  }
}
</script>
</body>
</html>
