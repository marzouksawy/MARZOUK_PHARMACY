<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل المنتج | صيدلية د. مرزوق الصاوي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E2A2E;
    --muted:rgba(14,42,46,0.6);
    --bg:#F6F2EA;
    --card:#FFFEFB;
    --primary:#0F4C4F;
    --primary-deep:#0A3638;
    --accent:#D98C4A;
    --whatsapp:#25D366;
    --line:rgba(14,42,46,0.12);
    --radius:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans Arabic', sans-serif;
    line-height:1.75;
    padding-bottom:88px;
  }
  h1,h2,.eyebrow,.price{font-family:'Tajawal', sans-serif;}
  .topbar{
    display:flex;align-items:center;gap:10px;
    padding:14px 18px;background:rgba(246,242,234,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:5;
  }
  .topbar a{color:var(--primary);text-decoration:none;font-weight:700;font-size:15px;}
  .topbar .brand{margin-inline-start:auto;color:var(--muted);font-size:13px;}
  .cart-link{
    position:relative;display:inline-flex;align-items:center;
    font-size:20px;text-decoration:none;margin-inline-start:14px;
  }
  .cart-badge{
    position:absolute;top:-6px;left:-8px;
    background:var(--accent);color:#fff;
    font-size:10.5px;font-weight:700;
    min-width:16px;height:16px;border-radius:999px;
    display:none;align-items:center;justify-content:center;
    padding:0 4px;font-family:'Tajawal', sans-serif;
  }

  .wrap{max-width:720px;margin:0 auto;padding:18px;}


  .card{
    position:relative;
    background:var(--card);
    border-radius:var(--radius);
    overflow:hidden;
    border:1px solid var(--line);
  }
  .stub{
    position:absolute;top:0;right:0;bottom:0;width:8px;
    background:var(--cat-color,var(--primary));
  }
  .media{
    aspect-ratio:4/3;background:#EEF3F1;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .media img{width:100%;height:100%;object-fit:cover;}
  .media .fallback{font-size:48px;opacity:.4;}

  .body{padding:20px 24px 22px;}
  .eyebrow{
    display:inline-flex;align-items:center;gap:6px;
    font-size:12.5px;font-weight:700;color:var(--cat-color,var(--primary));
    background:color-mix(in srgb, var(--cat-color,var(--primary)) 12%, white);
    padding:4px 10px;border-radius:999px;
  }
  h1{font-size:24px;margin:14px 0 2px;}
  .generic{color:var(--muted);font-size:15px;margin:0 0 6px;}
  .barcode{
    height:14px;margin:14px 0 16px;
    background-image:repeating-linear-gradient(90deg,var(--ink) 0 2px,transparent 2px 5px);
    opacity:.15;max-width:180px;
  }
  .meta-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .price{font-size:22px;font-weight:800;font-family:'Cairo',sans-serif;color:var(--accent);}
  .price small{font-size:13px;font-weight:400;color:var(--muted);}
  .badge{font-size:12.5px;font-weight:700;padding:5px 12px;border-radius:999px;}
  .badge.in{background:#E6F4EE;color:#1B8A5A;}
  .badge.out{background:#FBEAEA;color:#C0392B;}

  .section{margin-top:20px;}
  .section h2{font-size:15px;margin:0 0 6px;color:var(--ink);}
  .section p{margin:0;font-size:14.5px;line-height:1.9;color:#3A4744;}
  .company{font-size:13.5px;color:var(--muted);margin-top:4px;}

  .warn{
    background:#FFF8ED;border:1px solid #F3E0B8;border-radius:12px;
    padding:12px 14px;font-size:13.5px;line-height:1.8;color:#7A5B10;
  }
  .disclaimer{
    font-size:12px;color:var(--muted);margin-top:8px;line-height:1.7;
  }

  .alts{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .alt-chip{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--bg);border:1px solid var(--line);
    padding:8px 14px;border-radius:999px;font-size:13.5px;
    text-decoration:none;color:var(--ink);font-weight:700;
  }
  .alt-chip:hover{border-color:var(--primary);color:var(--primary);}

  .cta-bar{
    position:fixed;bottom:0;right:0;left:0;
    background:var(--card);border-top:1px solid var(--line);
    padding:12px 18px;display:flex;gap:10px;
    max-width:720px;margin:0 auto;
  }
  .cta-bar a, .cta-bar button{
    flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
    padding:13px;border-radius:12px;font-weight:700;font-size:15px;
    text-decoration:none;border:none;cursor:pointer;font-family:'IBM Plex Sans Arabic', sans-serif;
  }
  .cta-whatsapp{background:var(--whatsapp);color:#fff;}
  .cta-call{background:var(--bg);color:var(--primary);border:1px solid var(--line);}
  .cta-add-cart{background:var(--primary);color:#fff;}

  .not-found{padding:60px 20px;text-align:center;color:var(--muted);}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html#products">→ رجوع للموقع</a>
  <span class="brand">صيدلية د. مرزوق الصاوي</span>
  <a href="cart.html" class="cart-link">🛒<span id="cart-badge" class="cart-badge"></span></a>
</div>

<div class="wrap" id="app">
  <!-- المحتوى يتم حقنه هنا عبر product.js -->
</div>

<script type="module">
import { fetchProduct, CATEGORIES } from "./firebase-config.js";
import Cart from "./cart.js";

const WHATSAPP_NUMBER = "201062276534"; // رقم واتساب صيدلية د. مرزوق الصاوي

function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

function money(p){
  return `${p.price.toFixed(2)} ${p.currency === 'EGP' ? 'ج.م' : p.currency}`;
}

function renderNotFound(){
  document.getElementById('app').innerHTML = `
    <div class="not-found">
      <h2>المنتج غير موجود</h2>
      <p>تأكد من الرابط أو ارجع لصفحة المنتجات.</p>
    </div>`;
}

function renderProduct(product, categories, alts){
  const cat = categories.find(c => c.id === product.category) || {};

  const waText = encodeURIComponent(
    product.available
      ? `أريد طلب: ${product.trade_name}`
      : `أسأل الصيدلي عن: ${product.trade_name} (شايف إنه غير متوفر حاليًا في الموقع)`
  );

  document.getElementById('app').innerHTML = `
    <div class="card" style="--cat-color:${cat.color || '#0F5C55'}">
      <div class="stub"></div>
      <div class="media">
        <img src="${product.image}" alt="${product.trade_name}"
             onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'fallback\\'>${cat.icon || '💊'}</div>'">
      </div>
      <div class="body">
        <span class="eyebrow">${cat.icon || ''} ${cat.name || ''}</span>
        <h1>${product.trade_name}</h1>
        <p class="generic">المادة الفعالة: ${product.active_ingredient}</p>
        <div class="barcode"></div>

        <div class="meta-row">
          <div class="price">${money(product)}</div>
          <span class="badge ${product.available ? 'in' : 'out'}">
            ${product.available ? '✔ متوفر بالصيدلية' : '✕ غير متوفر حاليًا'}
          </span>
        </div>
        <div class="company">${product.company ? `الشركة المصنّعة: ${product.company}` : ''}</div>

        ${product.short_uses ? `
        <div class="section">
          <h2>الاستخدامات</h2>
          <p>${product.short_uses}</p>
        </div>` : ''}

        ${product.warnings ? `
        <div class="section">
          <h2>تحذيرات مهمة</h2>
          <div class="warn">${product.warnings}</div>
        </div>` : ''}

        ${product.general_dosage_note ? `
        <div class="disclaimer">⚠️ ${product.general_dosage_note}</div>` : ''}

        ${alts.length ? `
        <div class="section">
          <h2>بدائل متاحة</h2>
          <div class="alts">
            ${alts.map(a => `<a class="alt-chip" href="product.html?id=${a.id}">${a.trade_name}</a>`).join('')}
          </div>
        </div>` : ''}
      </div>
    </div>
  `;

  document.title = `${product.trade_name} | صيدلية د. مرزوق الصاوي`;

  const bar = document.createElement('div');
  bar.className = 'cta-bar';
  bar.innerHTML = product.available
    ? `
    <button type="button" class="cta-add-cart" id="add-to-cart-btn">🛒 أضف للسلة</button>
    <a class="cta-whatsapp" href="https://wa.me/${WHATSAPP_NUMBER}?text=${waText}" target="_blank">
      💬 اطلب عبر واتساب
    </a>
  `
    : `
    <a class="cta-call" style="flex:2;" href="https://wa.me/${WHATSAPP_NUMBER}?text=${waText}" target="_blank">
      🩺 استشر الصيدلي (غير متوفر حاليًا)
    </a>
  `;
  document.body.appendChild(bar);

  const addBtn = document.getElementById('add-to-cart-btn');
  if (addBtn) {
    addBtn.addEventListener('click', () => {
      Cart.addItem({
        id: product.id,
        trade_name: product.trade_name,
        price: product.price,
        image: product.image,
      });
    });
  }
}

(async function init(){
  const id = getParam('id');
  if(!id){ renderNotFound(); return; }
  const product = await fetchProduct(id);
  if(!product){ renderNotFound(); return; }

  // ===== تحسين V3.3: جلب كل بديل بقراءة مفردة بدل قراءة قاعدة المنتجات كاملة =====
  // ده بيقلل القراءات من 47 (المنتج + كل الـ46 منتج) إلى 1 + عدد البدائل بس (غالبًا 3-4 قراءات)
  const altIds = product.alternatives || [];
  const altResults = await Promise.all(altIds.map(altId => fetchProduct(altId)));
  const alts = altResults.filter(Boolean);

  renderProduct(product, CATEGORIES, alts);
})();
</script>
</body>
</html>
