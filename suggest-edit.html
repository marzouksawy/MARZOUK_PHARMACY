<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اقتراح تعديل منتج</title>
<style>
  body{font-family:sans-serif;background:#F6F2EA;color:#0E2A2E;padding:16px;line-height:1.6;}
  input, select{width:100%;box-sizing:border-box;padding:10px;border-radius:8px;border:1px solid #ccc;font-size:16px;margin-top:6px;}
  button{background:#0F4C4F;color:#fff;border:none;padding:12px 20px;border-radius:8px;font-size:15px;cursor:pointer;margin-top:10px;}
  button:disabled{opacity:.5;}
  .card{background:#fff;border-radius:10px;padding:14px;margin-top:10px;border:1px solid #ddd;cursor:pointer;}
  .card h3{margin:0 0 4px 0;font-size:16px;}
  .card p{margin:2px 0;font-size:13px;color:#555;}
  #form{display:none;background:#fff;border-radius:10px;padding:16px;margin-top:16px;border:2px solid #0F4C4F;}
  .photos{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .photos img{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #ccc;}
  .status{font-size:13px;margin-top:16px;}
  .ok{color:#2E7D55;}
  .err{color:#C0392B;}
  label{font-size:14px;font-weight:bold;display:block;margin-top:12px;}
  #session-summary{display:none;background:#fff;border-radius:10px;padding:14px;margin-top:16px;border:2px solid #25D366;}
  #session-summary h3{margin:0 0 8px 0;font-size:15px;}
  #session-list{padding-right:20px;font-size:13px;margin:0;}
  #session-list li{margin-bottom:4px;}
  #session-wa-btn{display:inline-block;margin-top:10px;background:#25D366;color:#fff;padding:10px 16px;border-radius:8px;text-decoration:none;font-size:14px;}
</style>
</head>
<body>
<h2>📝 اقتراح تعديل منتج</h2>
<p>دور على الصنف، اقترح السعر والتوفر وارفع صور — التعديل هيتراجع من الصيدلي قبل ما يظهر للزبون.</p>
<input id="search" type="text" placeholder="ابحث بالاسم التجاري...">
<button id="new-product-btn" style="background:#D98C4A;">➕ صنف جديد مش موجود في القائمة</button>
<div id="results"></div>

<div id="form">
  <h3 id="selected-name"></h3>
  <label>الاسم (تقدر تعدّله لو محتاج توضيح زي الشكل الدوائي أو التركيز)</label>
  <input id="name-edit" type="text">
  <div id="new-fields" style="display:none;">
    <label>المادة الفعالة</label>
    <input id="new-ingredient" type="text">
    <label>الشركة المصنّعة</label>
    <input id="new-company" type="text">
    <label>الشكل الدوائي (أقراص، شراب، حقن...)</label>
    <input id="new-form" type="text">
    <label>الفئة</label>
    <select id="new-category">
      <option value="drugs">💊 أدوية</option>
      <option value="supplements">🌿 فيتامينات ومكملات</option>
      <option value="care">🩹 عناية ومستلزمات طبية</option>
    </select>
  </div>
  <label>السعر المقترح (جنيه)</label>
  <input id="price" type="number" placeholder="مثال: 45">
  <label>
    <input id="available" type="checkbox" style="width:auto;display:inline-block;"> متاح في المخزون دلوقتي
  </label>
  <label style="color:#C0392B;" id="delete-label">
    <input id="delete-request" type="checkbox" style="width:auto;display:inline-block;"> 🗑️ اقتراح حذف هذا الصنف نهائيًا (مش موجود / اتوقف)
  </label>
  <label>صور المنتج (لحد 3 صور)</label>
  <input id="photo1" type="file" accept="image/*" capture="environment">
  <input id="photo2" type="file" accept="image/*" capture="environment">
  <input id="photo3" type="file" accept="image/*" capture="environment">
  <div class="photos" id="previews"></div>
  <button id="submit-btn">إرسال الاقتراح للمراجعة</button>
  <button id="cancel-btn" style="background:#888;">إلغاء</button>
</div>

<div id="status" class="status"></div>

<div id="session-summary">
  <h3>📋 ملخص الاقتراحات المُرسلة اليوم (<span id="session-count">0</span>)</h3>
  <ul id="session-list"></ul>
  <a id="session-wa-btn" href="#" target="_blank">📲 بلّغ الصيدلي على واتساب بكل الاقتراحات</a>
</div>

<script type="module">
  import { requireAuth, fetchAllProducts, db, doc, setDoc, collection, auth } from "./firebase-config.js";

  const searchBox = document.getElementById("search");
  const resultsDiv = document.getElementById("results");
  const formDiv = document.getElementById("form");
  const selectedName = document.getElementById("selected-name");
  const priceInput = document.getElementById("price");
  const availableInput = document.getElementById("available");
  const previewsDiv = document.getElementById("previews");
  const submitBtn = document.getElementById("submit-btn");
  const cancelBtn = document.getElementById("cancel-btn");
  const statusDiv = document.getElementById("status");
  const newProductBtn = document.getElementById("new-product-btn");
  const newFieldsDiv = document.getElementById("new-fields");
  const deleteRequestInput = document.getElementById("delete-request");
  const deleteLabel = document.getElementById("delete-label");
  let isNewProduct = false;

  function todayKey() {
    const d = new Date();
    return "suggestions_" + d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
  }

  function loadSessionSuggestions() {
    try {
      const raw = localStorage.getItem(todayKey());
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function saveSessionSuggestions() {
    try {
      localStorage.setItem(todayKey(), JSON.stringify(sessionSuggestions));
    } catch (e) {}
  }

  let sessionSuggestions = loadSessionSuggestions();

  const user = await requireAuth();
  statusDiv.innerHTML = '<span class="ok">جاري تحميل المنتجات...</span>';

  let allProducts = await fetchAllProducts();
  let selectedProduct = null;
  statusDiv.innerHTML = '<span class="ok">تم تحميل ' + allProducts.length + ' صنف.</span>';
  updateSessionSummary();

  searchBox.addEventListener("input", () => {
    const term = searchBox.value.trim().toUpperCase();
    resultsDiv.innerHTML = "";
    if (!term) return;
    const filtered = allProducts.filter(p => (p.trade_name || "").toUpperCase().includes(term)).slice(0, 25);
    filtered.forEach(p => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `<h3>${p.trade_name}</h3><p>${p.active_ingredient || ""} ${p.dosage_form ? "— " + p.dosage_form : ""}</p>`;
      card.addEventListener("click", () => selectProduct(p));
      resultsDiv.appendChild(card);
    });
  });

  newProductBtn.addEventListener("click", () => {
    isNewProduct = true;
    selectedProduct = null;
    selectedName.textContent = "➕ صنف جديد";
    document.getElementById("name-edit").value = "";
    document.getElementById("name-edit").placeholder = "اكتب الاسم التجاري للصنف الجديد";
    priceInput.value = "";
    availableInput.checked = false;
    previewsDiv.innerHTML = "";
    document.getElementById("photo1").value = "";
    document.getElementById("photo2").value = "";
    document.getElementById("photo3").value = "";
    newFieldsDiv.style.display = "block";
    deleteLabel.style.display = "none";
    deleteRequestInput.checked = false;
    formDiv.style.display = "block";
    resultsDiv.innerHTML = "";
    searchBox.value = "";
    formDiv.scrollIntoView({ behavior: "smooth" });
  });

  function selectProduct(p) {
    isNewProduct = false;
    selectedProduct = p;
    newFieldsDiv.style.display = "none";
    deleteLabel.style.display = "block";
    deleteRequestInput.checked = false;
    selectedName.textContent = p.trade_name;
    document.getElementById("name-edit").value = p.trade_name || "";
    priceInput.value = p.price || "";
    availableInput.checked = !!p.available;
    previewsDiv.innerHTML = "";
    document.getElementById("photo1").value = "";
    document.getElementById("photo2").value = "";
    document.getElementById("photo3").value = "";
    formDiv.style.display = "block";
    resultsDiv.innerHTML = "";
    searchBox.value = "";
    formDiv.scrollIntoView({ behavior: "smooth" });
  }

  cancelBtn.addEventListener("click", () => {
    formDiv.style.display = "none";
    selectedProduct = null;
    isNewProduct = false;
    deleteRequestInput.checked = false;
  });

  function compressImage(file, maxWidth = 800, maxSizeKB = 200) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let width = img.width, height = img.height;
          if (width > maxWidth) {
            height = Math.round(height * (maxWidth / width));
            width = maxWidth;
          }
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, width, height);

          const watermarkText = "صيدلية د. مرزوق الصاوي";
          const fontSize = Math.max(14, Math.round(width * 0.04));
          ctx.font = fontSize + "px sans-serif";
          const textWidth = ctx.measureText(watermarkText).width;
          const padding = 8;
          const boxWidth = textWidth + padding * 2;
          const boxHeight = fontSize + padding * 1.6;
          const wx = width - boxWidth - 10;
          const wy = height - boxHeight - 10;
          ctx.fillStyle = "rgba(15,76,79,0.65)";
          ctx.fillRect(wx, wy, boxWidth, boxHeight);
          ctx.fillStyle = "rgba(255,255,255,0.95)";
          ctx.textBaseline = "middle";
          ctx.fillText(watermarkText, wx + padding, wy + boxHeight / 2);

          let quality = 0.8;
          let dataUrl = canvas.toDataURL("image/jpeg", quality);
          while (dataUrl.length > maxSizeKB * 1024 * 1.37 && quality > 0.2) {
            quality -= 0.1;
            dataUrl = canvas.toDataURL("image/jpeg", quality);
          }
          resolve(dataUrl);
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function handlePhotoPreview() {
    previewsDiv.innerHTML = "";
    const files = [
      document.getElementById("photo1").files[0],
      document.getElementById("photo2").files[0],
      document.getElementById("photo3").files[0],
    ].filter(Boolean);
    for (const f of files) {
      const compressed = await compressImage(f);
      const img = document.createElement("img");
      img.src = compressed;
      previewsDiv.appendChild(img);
    }
  }

  document.getElementById("photo1").addEventListener("change", handlePhotoPreview);
  document.getElementById("photo2").addEventListener("change", handlePhotoPreview);
  document.getElementById("photo3").addEventListener("change", handlePhotoPreview);

  function updateSessionSummary() {
    const summaryDiv = document.getElementById("session-summary");
    const listEl = document.getElementById("session-list");
    const countEl = document.getElementById("session-count");
    const waBtn = document.getElementById("session-wa-btn");

    if (sessionSuggestions.length === 0) {
      summaryDiv.style.display = "none";
      return;
    }
    summaryDiv.style.display = "block";
    countEl.textContent = sessionSuggestions.length;

    listEl.innerHTML = "";
    sessionSuggestions.forEach((s, i) => {
      const li = document.createElement("li");
      li.textContent = s.delete_request
        ? `${i + 1}. 🗑️ طلب حذف: ${s.trade_name}`
        : `${i + 1}. ${s.trade_name} — ${s.price} ج.م — ${s.available ? "متاح" : "غير متاح"}`;
      listEl.appendChild(li);
    });

    const lines = sessionSuggestions.map((s, i) =>
      s.delete_request
        ? `${i + 1}. 🗑️ طلب حذف: ${s.trade_name}`
        : `${i + 1}. ${s.trade_name} — ${s.price} ج.م — ${s.available ? "متاح" : "غير متاح"}`
    ).join("\n");

    const waText = encodeURIComponent(
      `📝 ملخص اقتراحات من ${sessionSuggestions[0].submitted_by}\n` +
      `عدد الاقتراحات: ${sessionSuggestions.length}\n\n` +
      lines +
      `\n\nادخل approve-requests.html للمراجعة 🙏`
    );
    waBtn.href = `https://wa.me/966541796684?text=${waText}`;
  }

  submitBtn.addEventListener("click", async () => {
    if (!selectedProduct && !isNewProduct) return;
    const nameVal = document.getElementById("name-edit").value.trim();
    if (isNewProduct && !nameVal) {
      alert("لازم تكتب الاسم التجاري للصنف الجديد.");
      return;
    }
    if (!priceInput.value || Number(priceInput.value) <= 0) {
      alert("لازم تدخل سعر صحيح.");
      return;
    }
    submitBtn.disabled = true;
    submitBtn.textContent = "جاري الإرسال...";
    try {
      const files = [
        document.getElementById("photo1").files[0],
        document.getElementById("photo2").files[0],
        document.getElementById("photo3").files[0],
      ].filter(Boolean);
      const photos = [];
      for (const f of files) {
        photos.push(await compressImage(f));
      }
      const ref = doc(collection(db, "edit_requests"));
      const payload = {
        is_new: isNewProduct,
        productId: isNewProduct ? null : selectedProduct.id,
        trade_name: isNewProduct ? nameVal : selectedProduct.trade_name,
        suggested_name: isNewProduct ? nameVal : (nameVal || selectedProduct.trade_name),
        suggested_price: Number(priceInput.value),
        suggested_available: availableInput.checked,
        suggested_delete: isNewProduct ? false : deleteRequestInput.checked,
        photos: photos,
        submitted_by: user.email || user.uid,
        status: "pending",
        created_at: new Date().toISOString(),
      };
      if (isNewProduct) {
        payload.active_ingredient = document.getElementById("new-ingredient").value.trim();
        payload.company = document.getElementById("new-company").value.trim();
        payload.dosage_form = document.getElementById("new-form").value.trim();
        payload.category = document.getElementById("new-category").value;
      }
      await setDoc(ref, payload);

      sessionSuggestions.push({
        trade_name: payload.trade_name,
        price: payload.suggested_price,
        available: payload.suggested_available,
        delete_request: payload.suggested_delete,
        submitted_by: payload.submitted_by,
      });
      saveSessionSuggestions();
      updateSessionSummary();

      statusDiv.innerHTML =
        '<span class="ok">✅ تم إرسال ' + (payload.suggested_delete ? "طلب الحذف" : (isNewProduct ? "الصنف الجديد" : "الاقتراح")) +
        ' (اقتراح رقم ' + sessionSuggestions.length + ' اليوم). لما تخلص كل الأصناف، دوس زرار الواتساب تحت.</span>';
      formDiv.style.display = "none";
      selectedProduct = null;
      isNewProduct = false;
      deleteRequestInput.checked = false;
    } catch (err) {
      statusDiv.innerHTML = '<span class="err">❌ حصل خطأ: ' + err.message + '</span>';
    }
    submitBtn.disabled = false;
    submitBtn.textContent = "إرسال الاقتراح للمراجعة";
  });
</script>
</body>
</html>
