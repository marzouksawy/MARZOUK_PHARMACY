<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدليل الدوائي — صيدلية د. مرزوق الصاوي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E2A2E; --petrol:#0F4C4F; --petrol-deep:#0A3638;
    --cream:#F6F2EA; --paper:#FFFEFB; --amber:#D98C4A; --line:rgba(14,42,46,0.12);
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'IBM Plex Sans Arabic', sans-serif; background:var(--cream); color:var(--ink); padding-bottom:40px;}
  h1,h2,h3{font-family:'Tajawal';}
  a{color:inherit; text-decoration:none;}

  .topbar{
    display:flex; align-items:center; gap:10px; padding:14px 18px;
    background:rgba(246,242,234,0.92); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5;
  }
  .topbar a.back{color:var(--petrol); font-weight:700; font-size:15px;}
  .topbar .brand{margin-inline-start:auto; color:rgba(14,42,46,0.6); font-size:13px;}

  .hero{padding:28px 20px 10px; text-align:center;}
  .hero .eyebrow{
    display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700;
    color:var(--petrol); background:rgba(15,76,79,0.08); padding:5px 14px; border-radius:999px; margin-bottom:12px;
  }
  .hero h1{font-size:24px; margin:0 0 8px; color:var(--petrol-deep);}
  .hero p{font-size:13.5px; color:rgba(14,42,46,0.65); max-width:480px; margin:0 auto;}

  .wrap{max-width:760px; margin:0 auto; padding:20px;}

  .search-box input{
    width:100%; padding:13px 16px; border-radius:999px; border:1px solid var(--line);
    font-family:'IBM Plex Sans Arabic'; font-size:14.5px; background:var(--paper);
  }

  .filters{display:flex; gap:8px; flex-wrap:wrap; margin:16px 0;}
  .filters button{
    padding:7px 15px; border-radius:999px; border:1px solid var(--line); background:var(--paper);
    color:var(--ink); font-family:'IBM Plex Sans Arabic'; font-size:13px; cursor:pointer;
  }
  .filters button.active{background:var(--petrol); color:#fff; border-color:var(--petrol);}

  /* الفهرس الأبجدي */
  .alpha-index{
    display:flex; gap:6px; flex-wrap:wrap; margin:14px 0 22px; padding:12px;
    background:var(--paper); border-radius:12px; border:1px solid var(--line);
  }
  .alpha-index button{
    width:34px; height:34px; border-radius:8px; border:1px solid var(--line); background:var(--cream);
    font-family:'Tajawal'; font-weight:700; font-size:14px; cursor:pointer; color:var(--ink);
  }
  .alpha-index button.has-items{background:var(--petrol); color:#fff; border-color:var(--petrol);}
  .alpha-index button.has-items:hover{opacity:.85;}

  .group{margin-bottom:26px;}
  .group h2{
    font-size:20px; color:var(--amber); border-bottom:2px solid var(--amber);
    display:inline-block; padding-bottom:4px; margin-bottom:12px;
  }
  .entry{
    display:flex; align-items:center; gap:12px; background:var(--paper); border:1px solid var(--line);
    border-radius:12px; padding:12px 14px; margin-bottom:8px;
  }
  .entry .icon{
    width:38px; height:38px; border-radius:8px; background:var(--cream); display:flex;
    align-items:center; justify-content:center; font-size:18px; flex-shrink:0;
  }
  .entry .info{flex:1; min-width:0;}
  .entry .info h3{font-size:14.5px; margin:0 0 2px;}
  .entry .info p{font-size:12px; color:rgba(14,42,46,0.6); margin:0;}
  .entry .status{font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px; flex-shrink:0;}
  .status.in{background:#E6F4EE; color:#1B8A5A;}
  .status.out{background:#FBEAEA; color:#C0392B;}

  .empty{text-align:center; padding:40px 20px; color:rgba(14,42,46,0.5); font-size:14px;}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back">→ رجوع للموقع</a>
  <span class="brand">صيدلية د. مرزوق الصاوي</span>
</div>

<div class="hero">
  <span class="eyebrow">📖 مرجع صحي مجاني</span>
  <h1>الدليل الدوائي</h1>
  <p>تصفّح أو ابحث عن أي دواء لمعرفة استخداماته وتحذيراته وبدائله — سواء كان متوفرًا بالصيدلية الآن أو للاطلاع فقط.</p>
</div>

<div class="wrap">
  <div class="search-box">
    <input id="guide-search" type="text" placeholder="ابحث بالاسم التجاري أو المادة الفعالة...">
  </div>

  <div class="filters" id="category-filters"></div>
  <div class="alpha-index" id="alpha-index"></div>

  <div id="guide-results"></div>
</div>

<script type="module">
  import { fetchAllProducts, CATEGORIES } from "./firebase-config.js";

  const ARABIC_LETTERS = "ابتثجحخدذرزسشصضطظعغفقكلمنهوي".split("");

  let allProducts = [];
  let currentCategory = "all";
  let currentLetter = "";

  function normalize(text) {
    return (text || "").toString().trim().toLowerCase()
      .replace(/[\u064B-\u0652]/g, "")
      .replace(/[أإآ]/g, "ا")
      .replace(/ة/g, "ه")
      .replace(/ى/g, "ي");
  }

  function matches(p, q) {
    const nq = normalize(q);
    if (!nq) return true;
    const inKeywords = (p.keywords || []).some((k) => normalize(k).includes(nq));
    return (
      normalize(p.trade_name).includes(nq) ||
      normalize(p.active_ingredient).includes(nq) ||
      inKeywords
    );
  }

  function renderFilters() {
    const el = document.getElementById("category-filters");
    const chips = [{ id: "all", name: "الكل", icon: "📖" }, ...CATEGORIES];
    el.innerHTML = chips
      .map(
        (c, i) => `<button data-cat="${c.id}" class="${i === 0 ? "active" : ""}">${c.icon || ""} ${c.name}</button>`
      )
      .join("");
    el.querySelectorAll("button").forEach((btn) => {
      btn.addEventListener("click", () => {
        el.querySelectorAll("button").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        currentCategory = btn.dataset.cat;
        renderResults();
      });
    });
  }

  function renderAlphaIndex(availableLetters) {
    const el = document.getElementById("alpha-index");
    el.innerHTML = ARABIC_LETTERS.map((letter) => {
      const has = availableLetters.has(letter);
      return `<button data-letter="${letter}" class="${has ? "has-items" : ""}" ${has ? "" : "disabled style='opacity:.3;cursor:default;'"}>${letter}</button>`;
    }).join("");
    el.querySelectorAll("button.has-items").forEach((btn) => {
      btn.addEventListener("click", () => {
        currentLetter = currentLetter === btn.dataset.letter ? "" : btn.dataset.letter;
        renderResults();
      });
    });
  }

  function firstLetterGroup(name) {
    const n = normalize(name);
    return n.charAt(0);
  }

  function renderResults() {
    const q = document.getElementById("guide-search").value;
    let filtered = allProducts.filter((p) => {
      const catOk = currentCategory === "all" || p.category === currentCategory;
      const letterOk = !currentLetter || firstLetterGroup(p.trade_name) === currentLetter;
      return catOk && letterOk && matches(p, q);
    });

    const resultsEl = document.getElementById("guide-results");
    if (!filtered.length) {
      resultsEl.innerHTML = `<div class="empty">مفيش نتائج مطابقة.</div>`;
      return;
    }

    // تجميع حسب الحرف الأول للاسم التجاري
    filtered.sort((a, b) => a.trade_name.localeCompare(b.trade_name, "ar"));
    const groups = {};
    filtered.forEach((p) => {
      const letter = firstLetterGroup(p.trade_name);
      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(p);
    });

    resultsEl.innerHTML = Object.keys(groups)
      .sort((a, b) => a.localeCompare(b, "ar"))
      .map((letter) => {
        const items = groups[letter]
          .map((p) => {
            const cat = CATEGORIES.find((c) => c.id === p.category) || {};
            return `
            <a class="entry" href="product.html?id=${p.id}">
              <div class="icon">${cat.icon || "💊"}</div>
              <div class="info">
                <h3>${p.trade_name}</h3>
                <p>${p.active_ingredient || ""}</p>
              </div>
              <span class="status ${p.available ? "in" : "out"}">${p.available ? "متوفر" : "تثقيفي"}</span>
            </a>`;
          })
          .join("");
        return `<div class="group"><h2>${letter}</h2>${items}</div>`;
      })
      .join("");
  }

  document.getElementById("guide-search").addEventListener("input", renderResults);

  (async function init() {
    allProducts = await fetchAllProducts();
    const availableLetters = new Set(allProducts.map((p) => firstLetterGroup(p.trade_name)));
    renderFilters();
    renderAlphaIndex(availableLetters);
    renderResults();
  })();
</script>
</body>
</html>
