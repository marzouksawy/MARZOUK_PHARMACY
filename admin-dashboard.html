<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم — صيدلية د. مرزوق الصاوي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E2A2E; --petrol:#0F4C4F; --petrol-deep:#0A3638;
    --cream:#F6F2EA; --paper:#FFFEFB; --amber:#D98C4A; --line:rgba(14,42,46,0.12);
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'IBM Plex Sans Arabic', sans-serif; background:var(--cream); color:var(--ink);}
  h1,h2,h3{font-family:'Tajawal';}
  header{
    background:var(--petrol-deep); color:#fff; padding:16px 20px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
  }
  header h1{font-size:18px; margin:0;}
  header .actions{display:flex; gap:10px; align-items:center;}
  header a, header button{
    background:rgba(255,255,255,0.12); color:#fff; border:none; padding:9px 16px;
    border-radius:999px; font-family:'IBM Plex Sans Arabic'; font-size:13.5px; cursor:pointer; text-decoration:none;
  }
  .wrap{max-width:900px; margin:0 auto; padding:20px;}

  .toolbar{display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;}
  .btn-primary{
    background:var(--petrol); color:#fff; border:none; padding:12px 22px; border-radius:10px;
    font-family:'Tajawal'; font-weight:700; font-size:14.5px; cursor:pointer;
  }
  input#admin-search{
    flex:1; min-width:180px; padding:12px 16px; border-radius:10px; border:1px solid var(--line);
    font-family:'IBM Plex Sans Arabic'; background:var(--paper);
  }

  .product-row{
    background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:14px 16px;
    display:flex; align-items:center; gap:14px; margin-bottom:10px;
  }
  .product-row .thumb{
    width:50px; height:50px; border-radius:8px; background:var(--cream); display:flex;
    align-items:center; justify-content:center; font-size:22px; flex-shrink:0; overflow:hidden;
  }
  .product-row .thumb img{width:100%; height:100%; object-fit:contain;}
  .product-row .info{flex:1; min-width:0;}
  .product-row .info h3{font-size:14.5px; margin:0 0 3px;}
  .product-row .info p{font-size:12.5px; color:rgba(14,42,46,0.6); margin:0;}
  .product-row .badge{font-size:11px; padding:3px 10px; border-radius:999px; font-weight:700;}
  .badge.in{background:#E6F4EE; color:#1B8A5A;}
  .badge.out{background:#FBEAEA; color:#C0392B;}
  .product-row .row-actions{display:flex; gap:6px; flex-shrink:0;}
  .product-row button{
    border:none; border-radius:8px; padding:8px 12px; font-size:12.5px; cursor:pointer;
    font-family:'IBM Plex Sans Arabic';
  }
  .btn-edit{background:var(--petrol); color:#fff;}
  .btn-delete{background:#FBEAEA; color:#C0392B;}

  /* نافذة النموذج (Modal) */
  .modal-overlay{
    display:none; position:fixed; inset:0; background:rgba(14,42,46,0.55);
    align-items:center; justify-content:center; padding:16px; z-index:50;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--paper); border-radius:16px; padding:26px; width:100%; max-width:480px;
    max-height:90vh; overflow-y:auto;
  }
  .modal h2{font-size:18px; margin:0 0 18px;}
  .modal label{font-size:13px; font-weight:600; display:block; margin:12px 0 5px;}
  .modal input, .modal select, .modal textarea{
    width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--line);
    font-family:'IBM Plex Sans Arabic'; font-size:13.5px; background:var(--cream);
  }
  .modal textarea{resize:vertical; min-height:60px;}
  .modal .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .modal .toggle-row{display:flex; align-items:center; gap:8px; margin-top:14px;}
  .modal .modal-actions{display:flex; gap:10px; margin-top:22px;}
  .modal .btn-cancel{
    background:var(--cream); color:var(--ink); border:1px solid var(--line);
    padding:11px 20px; border-radius:10px; cursor:pointer; flex:1; font-family:'IBM Plex Sans Arabic';
  }
  .modal .btn-save{
    background:var(--petrol); color:#fff; border:none; padding:11px 20px; border-radius:10px;
    cursor:pointer; flex:2; font-family:'Tajawal'; font-weight:700;
  }
  #image-preview{width:80px; height:80px; border-radius:8px; background:var(--cream); margin-top:8px; overflow:hidden;}
  #image-preview img{width:100%; height:100%; object-fit:contain;}
  #save-status{font-size:13px; text-align:center; margin-top:10px; color:var(--petrol);}
  .loading{text-align:center; padding:40px; color:rgba(14,42,46,0.5);}
  .photo-note{font-size:11.5px; font-weight:normal; color:rgba(14,42,46,0.5); display:block; margin-top:2px;}

  /* شاشة القص */
  #crop-modal{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;padding:16px;box-sizing:border-box;touch-action:none;}
  #crop-header{color:#fff;font-size:14px;margin-bottom:12px;text-align:center;font-family:'IBM Plex Sans Arabic';}
  #crop-container{position:relative;max-width:100%;max-height:62vh;touch-action:none;}
  #crop-image{display:block;max-width:100%;max-height:62vh;user-select:none;-webkit-user-drag:none;}
  #crop-box{position:absolute;border:2px solid var(--amber);box-shadow:0 0 0 9999px rgba(0,0,0,0.55);touch-action:none;}
  #crop-box .move-area{position:absolute;inset:0;touch-action:none;}
  #crop-box .handle{position:absolute;width:44px;height:44px;touch-action:none;display:flex;align-items:center;justify-content:center;}
  #crop-box .handle::after{content:"";display:block;width:26px;height:26px;background:var(--amber);border-radius:50%;border:2px solid #fff;pointer-events:none;}
  #crop-box .handle.tl{top:-22px;left:-22px;}
  #crop-box .handle.tr{top:-22px;right:-22px;}
  #crop-box .handle.bl{bottom:-22px;left:-22px;}
  #crop-box .handle.br{bottom:-22px;right:-22px;}
  #crop-actions{display:flex;gap:10px;margin-top:14px;width:100%;max-width:400px;}
  #crop-actions button{flex:1;padding:11px 20px;border:none;border-radius:10px;cursor:pointer;font-family:'IBM Plex Sans Arabic';font-size:14px;}
  #crop-confirm{background:var(--petrol);color:#fff;}
  #crop-cancel{background:#888;color:#fff;}
</style>
</head>
<body>

<header>
  <h1>لوحة تحكم صيدلية د. مرزوق الصاوي</h1>
  <div class="actions">
    <a href="admin-orders.html">الطلبات</a>
    <a href="index.html">عرض الموقع</a>
    <button id="logout-btn">تسجيل الخروج</button>
  </div>
</header>

<div class="wrap">
  <div class="toolbar">
    <input id="admin-search" type="text" placeholder="ابحث في المنتجات...">
    <button class="btn-primary" id="add-product-btn">+ إضافة منتج جديد</button>
  </div>

  <div id="products-list" class="loading">جاري تحميل المنتجات...</div>
</div>

<!-- نافذة إضافة/تعديل منتج -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">إضافة منتج جديد</h2>
    <form id="product-form">
      <input type="hidden" id="product-id">

      <label>الاسم التجاري</label>
      <input type="text" id="f-trade-name" required>

      <label>المادة الفعالة</label>
      <input type="text" id="f-active-ingredient">

      <div class="row2">
        <div>
          <label>الفئة</label>
          <select id="f-category">
            <option value="drugs">أدوية</option>
            <option value="supplements">فيتامينات ومكملات</option>
            <option value="care">عناية ومستلزمات طبية</option>
          </select>
        </div>
        <div>
          <label>السعر (ج.م)</label>
          <input type="number" id="f-price" step="0.01" required>
        </div>
      </div>

      <label>الشركة المصنّعة (اختياري)</label>
      <input type="text" id="f-company">

      <label>كلمات بحث إضافية بالإنجليزي (افصل بينهم بفاصلة ،)</label>
      <input type="text" id="f-keywords" placeholder="مثال: Panadol, Panadol Extra">

      <label>وصف مختصر / الاستخدامات</label>
      <textarea id="f-short-uses"></textarea>

      <label>تحذيرات (اختياري)</label>
      <textarea id="f-warnings"></textarea>

      <label>صورة المنتج (اختياري)<span class="photo-note">هتقدر تقص الصورة عشان تشيل أي حواف أو خلفية حوالين المنتج</span></label>
      <input type="file" id="f-image-file" accept="image/*">
      <div id="image-preview"></div>

      <div class="toggle-row">
        <input type="checkbox" id="f-available" style="width:auto;">
        <label style="margin:0;">متوفر بالصيدلية حاليًا</label>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-cancel" id="cancel-btn">إلغاء</button>
        <button type="submit" class="btn-save" id="save-btn">حفظ المنتج</button>
      </div>
      <div id="save-status"></div>
    </form>
  </div>
</div>

<!-- شاشة القص التفاعلية -->
<div id="crop-modal">
  <div id="crop-header">اسحب الحواف أو الزوايا عشان يفضل صورة المنتج بس، من غير أي حواف أو خلفية</div>
  <div id="crop-container">
    <img id="crop-image" src="" alt="crop">
    <div id="crop-box">
      <div class="move-area"></div>
      <div class="handle tl"></div>
      <div class="handle tr"></div>
      <div class="handle bl"></div>
      <div class="handle br"></div>
    </div>
  </div>
  <div id="crop-actions">
    <button id="crop-confirm">✅ تم القص</button>
    <button id="crop-cancel">إلغاء</button>
  </div>
</div>

<script type="module">
  import { requireAdminAuth, logout, fetchAllProducts, saveProduct, deleteProduct, CATEGORIES } from "./firebase-config.js";

  let allProducts = [];

  // حماية الصفحة: لازم يكون مسجّل دخول وصلاحيته مش "assistant"
  // المساعدين بيتحولوا تلقائيًا لـ suggest-edit.html من جوه الدالة نفسها
  await requireAdminAuth();

  document.getElementById("logout-btn").addEventListener("click", async () => {
    await logout();
    window.location.href = "admin-login.html";
  });

  // ===== تحميل وعرض المنتجات =====
  async function loadProducts() {
    const listEl = document.getElementById("products-list");
    listEl.innerHTML = `<div class="loading">جاري تحميل المنتجات...</div>`;
    allProducts = await fetchAllProducts();
    renderProducts(allProducts);
  }

  function renderProducts(products) {
    const listEl = document.getElementById("products-list");
    if (!products.length) {
      listEl.innerHTML = `<div class="loading">مفيش منتجات لسه.</div>`;
      return;
    }
    listEl.innerHTML = products
      .map((p) => {
        const cat = CATEGORIES.find((c) => c.id === p.category) || {};
        const thumb = p.image
          ? `<img src="${p.image}" alt="">`
          : cat.icon || "💊";
        return `
        <div class="product-row" data-id="${p.id}">
          <div class="thumb">${thumb}</div>
          <div class="info">
            <h3>${p.trade_name}</h3>
            <p>${cat.name || ""} · ${p.price} ج.م</p>
          </div>
          <span class="badge ${p.available ? "in" : "out"}">${p.available ? "متوفر" : "غير متوفر"}</span>
          <div class="row-actions">
            <button class="btn-edit" data-action="edit" data-id="${p.id}">تعديل</button>
            <button class="btn-delete" data-action="delete" data-id="${p.id}">حذف</button>
          </div>
        </div>`;
      })
      .join("");
  }

  document.getElementById("admin-search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    const filtered = allProducts.filter((p) => {
      const inTradeName = (p.trade_name || "").toLowerCase().includes(q);
      const inActiveIngredient = (p.active_ingredient || "").toLowerCase().includes(q);
      const inKeywords = (p.keywords || []).some((k) => (k || "").toLowerCase().includes(q));
      return inTradeName || inActiveIngredient || inKeywords;
    });
    renderProducts(filtered);
  });

  // ===== فتح/غلق نافذة النموذج =====
  const overlay = document.getElementById("modal-overlay");
  const form = document.getElementById("product-form");
  let currentImageBase64 = "";

  function openModal(product = null) {
    form.reset();
    document.getElementById("image-preview").innerHTML = "";
    currentImageBase64 = product ? product.image || "" : "";
    if (currentImageBase64) {
      document.getElementById("image-preview").innerHTML = `<img src="${currentImageBase64}">`;
    }
    document.getElementById("modal-title").textContent = product ? "تعديل منتج" : "إضافة منتج جديد";
    document.getElementById("product-id").value = product ? product.id : "";
    document.getElementById("f-trade-name").value = product ? product.trade_name || "" : "";
    document.getElementById("f-active-ingredient").value = product ? product.active_ingredient || "" : "";
    document.getElementById("f-category").value = product ? product.category || "drugs" : "drugs";
    document.getElementById("f-price").value = product ? product.price || 0 : "";
    document.getElementById("f-company").value = product ? product.company || "" : "";
    document.getElementById("f-keywords").value = product && product.keywords ? product.keywords.join(", ") : "";
    document.getElementById("f-short-uses").value = product ? product.short_uses || "" : "";
    document.getElementById("f-warnings").value = product ? product.warnings || "" : "";
    document.getElementById("f-available").checked = product ? !!product.available : true;
    document.getElementById("save-status").textContent = "";
    overlay.classList.add("open");
  }

  function closeModal() {
    overlay.classList.remove("open");
  }

  document.getElementById("add-product-btn").addEventListener("click", () => openModal());
  document.getElementById("cancel-btn").addEventListener("click", closeModal);
  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) closeModal();
  });

  document.getElementById("products-list").addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-action]");
    if (!btn) return;
    const id = btn.dataset.id;
    const product = allProducts.find((p) => p.id === id);
    if (btn.dataset.action === "edit") {
      openModal(product);
    } else if (btn.dataset.action === "delete") {
      if (confirm(`متأكد إنك عايز تحذف "${product.trade_name}"؟`)) {
        deleteProduct(id).then(loadProducts);
      }
    }
  });

  // ===== اللوجو + المعالجة النهائية (تصغير + ختم اللوجو + ضغط) =====
  let logoImage = null;
  function loadLogo() {
    return new Promise((resolve) => {
      if (logoImage) { resolve(logoImage); return; }
      const img = new Image();
      img.onload = () => { logoImage = img; resolve(img); };
      img.onerror = () => resolve(null);
      img.src = "logo-watermark.png";
    });
  }

  function processImageDataUrl(dataUrl, maxWidth = 800, maxSizeKB = 200) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = async () => {
        let width = img.width, height = img.height;
        if (width > maxWidth) {
          height = Math.round(height * (maxWidth / width));
          width = maxWidth;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);

        const logo = await loadLogo();
        if (logo) {
          const logoWidth = Math.round(width * 0.24);
          const logoHeight = Math.round(logoWidth * (logo.height / logo.width));
          const margin = 10;
          const lx = width - logoWidth - margin;
          const ly = height - logoHeight - margin;
          const pad = 6;
          ctx.fillStyle = "rgba(255,255,255,0.8)";
          ctx.fillRect(lx - pad, ly - pad, logoWidth + pad * 2, logoHeight + pad * 2);
          ctx.drawImage(logo, lx, ly, logoWidth, logoHeight);
        }

        let quality = 0.8;
        let out = canvas.toDataURL("image/jpeg", quality);
        while (out.length > maxSizeKB * 1024 * 1.37 && quality > 0.2) {
          quality -= 0.1;
          out = canvas.toDataURL("image/jpeg", quality);
        }
        resolve(out);
      };
      img.onerror = reject;
      img.src = dataUrl;
    });
  }

  // ===== شاشة القص التفاعلية =====
  let cropImgNatural = { w: 0, h: 0 };
  const cropModal = document.getElementById("crop-modal");
  const cropImageEl = document.getElementById("crop-image");
  const cropBox = document.getElementById("crop-box");
  const cropContainer = document.getElementById("crop-container");

  function getImageBounds() {
    const rect = cropImageEl.getBoundingClientRect();
    const contRect = cropContainer.getBoundingClientRect();
    return {
      left: rect.left - contRect.left,
      top: rect.top - contRect.top,
      width: rect.width,
      height: rect.height,
    };
  }

  function setCropBox(x, y, w, h) {
    cropBox.style.left = x + "px";
    cropBox.style.top = y + "px";
    cropBox.style.width = w + "px";
    cropBox.style.height = h + "px";
  }

  function getBoxRect() {
    return {
      x: parseFloat(cropBox.style.left),
      y: parseFloat(cropBox.style.top),
      w: parseFloat(cropBox.style.width),
      h: parseFloat(cropBox.style.height),
    };
  }

  function openCropper(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      cropImageEl.src = e.target.result;
      cropImageEl.onload = () => {
        cropImgNatural = { w: cropImageEl.naturalWidth, h: cropImageEl.naturalHeight };
        cropModal.style.display = "flex";
        requestAnimationFrame(() => {
          const b = getImageBounds();
          const w = b.width * 0.86;
          const h = b.height * 0.86;
          const x = b.left + (b.width - w) / 2;
          const y = b.top + (b.height - h) / 2;
          setCropBox(x, y, w, h);
        });
      };
    };
    reader.readAsDataURL(file);
  }

  let dragMode = null;
  let dragStart = { x: 0, y: 0 };
  let boxStart = { x: 0, y: 0, w: 0, h: 0 };
  const minSize = 40;

  function startDrag(mode, clientX, clientY) {
    dragMode = mode;
    dragStart = { x: clientX, y: clientY };
    boxStart = getBoxRect();
  }

  function onDragMove(clientX, clientY) {
    if (!dragMode) return;
    const dx = clientX - dragStart.x;
    const dy = clientY - dragStart.y;
    const b = getImageBounds();
    let { x, y, w, h } = boxStart;

    if (dragMode === "move") {
      x = Math.max(b.left, Math.min(boxStart.x + dx, b.left + b.width - w));
      y = Math.max(b.top, Math.min(boxStart.y + dy, b.top + b.height - h));
    } else if (dragMode === "br") {
      w = Math.min(Math.max(minSize, boxStart.w + dx), b.left + b.width - x);
      h = Math.min(Math.max(minSize, boxStart.h + dy), b.top + b.height - y);
    } else if (dragMode === "bl") {
      const newW = Math.max(minSize, boxStart.w - dx);
      x = Math.max(b.left, boxStart.x + boxStart.w - newW);
      w = boxStart.x + boxStart.w - x;
      h = Math.min(Math.max(minSize, boxStart.h + dy), b.top + b.height - y);
    } else if (dragMode === "tr") {
      w = Math.min(Math.max(minSize, boxStart.w + dx), b.left + b.width - x);
      const newH = Math.max(minSize, boxStart.h - dy);
      y = Math.max(b.top, boxStart.y + boxStart.h - newH);
      h = boxStart.y + boxStart.h - y;
    } else if (dragMode === "tl") {
      const newW = Math.max(minSize, boxStart.w - dx);
      x = Math.max(b.left, boxStart.x + boxStart.w - newW);
      w = boxStart.x + boxStart.w - x;
      const newH = Math.max(minSize, boxStart.h - dy);
      y = Math.max(b.top, boxStart.y + boxStart.h - newH);
      h = boxStart.y + boxStart.h - y;
    }
    setCropBox(x, y, w, h);
  }

  function endDrag() { dragMode = null; }

  cropBox.querySelector(".move-area").addEventListener("pointerdown", (e) => {
    e.preventDefault();
    e.target.setPointerCapture(e.pointerId);
    startDrag("move", e.clientX, e.clientY);
  });
  ["tl", "tr", "bl", "br"].forEach((corner) => {
    cropBox.querySelector("." + corner).addEventListener("pointerdown", (e) => {
      e.preventDefault();
      e.stopPropagation();
      e.target.setPointerCapture(e.pointerId);
      startDrag(corner, e.clientX, e.clientY);
    });
  });
  window.addEventListener("pointermove", (e) => {
    if (dragMode) e.preventDefault();
    onDragMove(e.clientX, e.clientY);
  }, { passive: false });
  window.addEventListener("pointerup", endDrag);
  window.addEventListener("pointercancel", endDrag);

  document.getElementById("crop-confirm").addEventListener("click", async () => {
    const b = getImageBounds();
    const box = getBoxRect();
    const relX = (box.x - b.left) / b.width;
    const relY = (box.y - b.top) / b.height;
    const relW = box.w / b.width;
    const relH = box.h / b.height;

    const sx = relX * cropImgNatural.w;
    const sy = relY * cropImgNatural.h;
    const sw = relW * cropImgNatural.w;
    const sh = relH * cropImgNatural.h;

    const canvas = document.createElement("canvas");
    canvas.width = sw;
    canvas.height = sh;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(cropImageEl, sx, sy, sw, sh, 0, 0, sw, sh);
    const croppedDataUrl = canvas.toDataURL("image/jpeg", 0.95);

    cropModal.style.display = "none";

    const finalDataUrl = await processImageDataUrl(croppedDataUrl);
    currentImageBase64 = finalDataUrl;
    document.getElementById("image-preview").innerHTML = `<img src="${currentImageBase64}">`;
  });

  document.getElementById("crop-cancel").addEventListener("click", () => {
    cropModal.style.display = "none";
    document.getElementById("f-image-file").value = "";
  });

  // ===== رفع صورة: تفتح شاشة القص أولًا =====
  document.getElementById("f-image-file").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;
    openCropper(file);
  });

  // ===== حفظ المنتج =====
  function slugify(text) {
    return (
      "p_" +
      text
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9\u0600-\u06FF]+/g, "_")
        .slice(0, 30) +
      "_" +
      Date.now().toString(36)
    );
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const saveBtn = document.getElementById("save-btn");
    const statusEl = document.getElementById("save-status");
    saveBtn.disabled = true;
    statusEl.textContent = "جاري الحفظ...";

    let id = document.getElementById("product-id").value;
    const tradeName = document.getElementById("f-trade-name").value.trim();
    if (!id) id = slugify(tradeName);

    const data = {
      trade_name: tradeName,
      active_ingredient: document.getElementById("f-active-ingredient").value.trim(),
      category: document.getElementById("f-category").value,
      price: parseFloat(document.getElementById("f-price").value) || 0,
      currency: "EGP",
      company: document.getElementById("f-company").value.trim(),
      keywords: document.getElementById("f-keywords").value
        .split(",")
        .map((k) => k.trim())
        .filter(Boolean),
      short_uses: document.getElementById("f-short-uses").value.trim(),
      warnings: document.getElementById("f-warnings").value.trim(),
      available: document.getElementById("f-available").checked,
      image: currentImageBase64 || "",
      general_dosage_note: "",
      alternatives: [],
    };

    try {
      await saveProduct(id, data);
      statusEl.textContent = "✔ تم الحفظ بنجاح";
      await loadProducts();
      setTimeout(closeModal, 600);
    } catch (err) {
      statusEl.textContent = "❌ حصل خطأ: " + err.message;
    }
    saveBtn.disabled = false;
  });

  loadProducts();
</script>
</body>
</html>
